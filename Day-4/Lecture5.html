<!doctype html>
<html>
  <head>
    <title>Day-4/Lec-5</title>
  </head>
  <body>
    <h1>Registration Form</h1>
    <form>
      <fieldset>
        <legend>Personal Information</legend>
        <label for="name">Name :</label><br />
        <input id="name" type="text" placeholder="Virat kohli" /><br />
        <label for="email">Email :</label><br />
        <input id="email" type="email" placeholder="exaple@gmail.com" /><br />
        <label for="password">Password :</label><br />
        <input
          id="password"
          type="password"
          placeholder="8 digit password with upppercase"
        /><br />

        <!-- <input type="radio" />  -->
        <input id="terms" type="checkbox" />
        <label for="terms">Accept Terms and Conditions</label><br />
        <label>Your message</label><br />
        <textarea
          rows="6"
          cols="30"
          placeholder="Type your message..."
        ></textarea
        ><br />
        <input type="submit" value="Register" />
      </fieldset>
    </form>
  </body>
</html>
