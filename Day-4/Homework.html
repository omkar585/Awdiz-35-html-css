<!DOCTYPE html>
<html lang="en">
<head>
 
    <title>Registration Form</title>

</head>
<body>
     <h1>Registration Form</h1>
    <form>
        <fieldset>
         <legend>Persoanl Information</legend>

            <label>Name:</label>
            <br />
            <input type="text" placeholder="Omkar Perekar" /><br />

            <label>Email:</label>
            <br />
            <input type="email" placeholder="abc@gmail.com" /><br />

            <label>Password:</label>
            <br />
            <input type="password" placeholder="8 digit use  one upppercase" /><br />

            <label>Gender:</label>
            <br />
            <input type="radio" name="" />
            <label>Male</label>
            <input type="radio" name="" />
            <label>Female</label>
            <br />

            <label>Skills:</label>
            <br />
            <input id="JAVA" type="checkbox" />
            <label for="JAVA">JAVA</label>
            <input id="React" type="checkbox" />
            <label for="React">React</label>
            <input id="SQL" type="checkbox" />
            <label for="SQL">SQL</label>
            <input id="Python" type="checkbox" />
            <label for="Python">Python</label>
            <br />

            <label>Bio:</label><br />
            <textarea
            rows="5"
            cols="250"
            placeholder="type a massage"
           ></textarea>
            <br />
    
           <input type="submit"  />


        </fieldset>
    </form>
    
</body>
</html>
