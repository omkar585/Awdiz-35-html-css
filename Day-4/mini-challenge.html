<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Mini-Challenge</title>

</head>
<body>
    <h1>Feedback Form</h1>

    <form>
     <fieldset>
        <legend>
            Persoanl Information
        </legend>
        <label>Name:</label><br />
        <input type="text" placeholder="e.g.Omkar"  /><br />
        <label>Email:</label><br />
        <input type="email" placeholder="abc@gmail.com" /><br />
        <label>Feedback message:</label><br />
        <textarea 
         rows="5"
         cols="30"
         placeholder="Type your message..."></textarea><br />

         <input type="radio" name="" />
         <label>Male</label>
         <input type="radio" name="" />
         <label>Female</label><br />

         <input id="terms" type="checkbox" />
         <label for="terms">Subscribe</label>
         <br />
         <button>submit</button>
     </fieldset>
    </form>
    
</body>
</html>
